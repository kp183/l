[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentlens"
version = "0.1.0"
description = "AgentLens Python SDK — zero-overhead observability for AI agents"
requires-python = ">=3.9"
dependencies = [
    "httpx==0.28.1",
    "structlog==25.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest==9.0.3",
    "hypothesis==6.152.9",
    "pytest-asyncio==1.3.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["agentlens"]
